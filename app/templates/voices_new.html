{% extends 'base.html' %}
{% block content %}
<h1>Create cloned voice</h1>
<form method="post" action="/api/voices/clone" enctype="multipart/form-data">
  <input name="name" placeholder="Voice name" required />
  <input type="file" name="audio_file" required />
  <button type="submit">Create</button>
</form>
{% endblock %}
